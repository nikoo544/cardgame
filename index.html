<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Duel: d20 Nexus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Spectral:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">DUNGEON DUEL</div>
            <div id="connection-info">
                <span id="status">Buscando grupo...</span>
                <button id="copy-btn" class="mini-btn">INVITAR AVENTURERO</button>
            </div>
        </header>

        <main id="game-board">
            <!-- Opponent -->
            <section class="player-field opponent">
                <div class="field-label">EL ENEMIGO</div>
                <div class="stats">
                    <span class="name">RIVAL</span>
                    <div class="hp-container">
                        <div id="opp-hp" class="hp-bar" style="width:100%"></div>
                        <span class="hp-text">HP: 100/100</span>
                    </div>
                </div>
                <div id="opp-visual" class="visual-box">
                    <div id="opp-stance-reveal" class="stance-text">?</div>
                </div>
            </section>

            <!-- Middle / Battle Log -->
            <section id="middle-panel">
                <div id="phase-label">ESPERANDO AL DUELISTA</div>
                <div id="action-zone">
                    <div id="die-box">
                        <div id="die-label">d20</div>
                        <div id="die-value">?</div>
                        <button id="roll-btn" disabled>LANZAR INICIATIVA</button>
                    </div>
                </div>
                <div id="battle-log"></div>
            </section>

            <!-- Local Player -->
            <section class="player-field local">
                <div class="field-label">TU HÉROE</div>
                <div id="selection-grid">
                    <button class="stance-btn" data-stance="FIRE">⚔️ ATAQUE</button>
                    <button class="stance-btn" data-stance="WATER">🛡️ DEFENSA</button>
                    <button class="stance-btn" data-stance="EARTH">🧙 MAGIA</button>
                </div>
                <div class="stats">
                    <span class="name">AVENTURERO</span>
                    <div class="hp-container">
                        <div id="player-hp" class="hp-bar" style="width:100%"></div>
                        <span class="hp-text">HP: 100/100</span>
                    </div>
                </div>
                <div id="player-visual" class="visual-box">
                    <div id="player-stance-reveal" class="stance-text">?</div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js" type="module"></script>
</body>
</html>
