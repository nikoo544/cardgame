<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Tactics: Dungeon Chess</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">NEXUS TACTICS</div>
            <div id="connection-info">
                <span id="status">Buscando grupo...</span>
                <button id="copy-btn" class="mini-btn">INVITAR RIVAL</button>
            </div>
        </header>

        <main id="game-container">
            <!-- Left Panel: Stats & Cards -->
            <aside id="side-panel">
                <div id="turn-info">TURNO DE: <span id="current-turn-label">JUGADOR 1</span></div>
                <div id="unit-info" class="parchment">
                    <h3>INFORMACIÓN</h3>
                    <p id="unit-details">Selecciona una unidad</p>
                </div>
                <div id="card-hand">
                    <!-- Cards will appear here -->
                </div>
            </aside>

            <!-- Center: The Board -->
            <div id="board-container">
                <div id="board">
                    <!-- 8x8 Grid generated by JS -->
                </div>
            </div>

            <!-- Right Panel: Battle Log & Dice -->
            <aside id="action-panel">
                <div id="battle-log"></div>
                <div id="dice-zone">
                    <div id="die-label">d20</div>
                    <div id="die-value">?</div>
                </div>
            </aside>
        </main>

        <footer>
            <div id="phase-status">FASE: DESPLIEGUE</div>
        </footer>
    </div>

    <!-- PeerJS for P2P -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js" type="module"></script>
</body>
</html>
