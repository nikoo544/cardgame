<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Quest: Open World RPG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <div class="modal parchment">
            <h1>NEXUS QUEST</h1>
            <div id="welcome-status">Iniciando conexión...</div>
            <p>Elige tu identidad para la aventura</p>
            <input type="text" id="player-name" placeholder="Tu nombre de héroe...">
            <div id="icon-selector">
                <button class="icon-btn" data-icon="⚔️">⚔️ Guerrero</button>
                <button class="icon-btn" data-icon="🧙">🧙 Mago</button>
                <button class="icon-btn" data-icon="🏹">🏹 Arquero</button>
                <button class="icon-btn" data-icon="✨">✨ Clérigo</button>
            </div>
            <button id="start-game-btn" class="main-btn">ENTRAR AL NEXO</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header>
            <div class="logo">NEXUS QUEST</div>
            <div id="connection-info">
                <span id="status">Buscando grupo...</span>
                <button id="copy-btn" class="mini-btn">INVITAR COMPAÑERO</button>
            </div>
        </header>

        <main id="game-container">
            <!-- Left: Character Sheet -->
            <aside id="character-sheet" class="parchment">
                <div id="local-hero-info">
                    <h2 id="hero-name-display">Héroe</h2>
                    <div id="hero-icon-display">⚔️</div>
                    <div class="stat">❤️ HP: <span id="hero-hp">100</span></div>
                    <div class="stat">💰 ORO: <span id="hero-gold">50</span></div>
                    <div class="stat">🌟 XP: <span id="hero-xp">0</span></div>
                </div>
                <hr>
                <h3>ACCIONES</h3>
                <div id="action-buttons">
                    <button id="move-action" class="action-btn">MOVER</button>
                    <button id="rest-action" class="action-btn">DESCANSAR</button>
                </div>
            </aside>

            <!-- Center: The World -->
            <div id="world-view">
                <div id="map-container">
                    <div id="map"></div>
                </div>
            </div>

            <!-- Right: Event & Log -->
            <aside id="right-panel">
                <div id="event-box" class="parchment">
                    <h3>EVENTO</h3>
                    <div id="event-content">Camina por el mapa para encontrar aventuras.</div>
                    <div id="event-choices"></div>
                </div>
                <div id="battle-log"></div>
            </aside>
        </main>

        <footer>
            <div id="turn-display">Turno de: <span id="current-player-name">Cargando...</span></div>
        </footer>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
