<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Nexus 1v1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">BATTLE NEXUS</div>
            <div id="connection-info">
                <span id="status">Esperando...</span>
                <button id="copy-btn" class="mini-btn">COPIAR LINK</button>
            </div>
        </header>

        <main id="game-board">
            <!-- Opponent -->
            <section class="player-field opponent">
                <div class="field-label">CAMPO RIVAL</div>
                <div class="stats">
                    <span class="name">RIVAL</span>
                    <div class="hp-container"><div id="opp-hp" class="hp-bar" style="width:100%"></div></div>
                </div>
                <div id="opp-visual" class="visual-box">
                    <div id="opp-stance-reveal" class="stance-text">?</div>
                </div>
            </section>

            <!-- Middle / Battle Log -->
            <section id="middle-panel">
                <div id="phase-label">ESPERANDO JUGADOR</div>
                <div id="action-zone">
                    <div id="die-box">
                        <div id="die-value">?</div>
                        <button id="roll-btn" disabled>LANZAR DADO</button>
                    </div>
                </div>
                <div id="battle-log"></div>
            </section>

            <!-- Local Player -->
            <section class="player-field local">
                <div class="field-label">TU CAMPO</div>
                <div id="selection-grid">
                    <button class="stance-btn" data-stance="FIRE">🔥 FUEGO</button>
                    <button class="stance-btn" data-stance="WATER">💧 AGUA</button>
                    <button class="stance-btn" data-stance="EARTH">🌿 TIERRA</button>
                </div>
                <div class="stats">
                    <span class="name">TÚ</span>
                    <div class="hp-container"><div id="player-hp" class="hp-bar" style="width:100%"></div></div>
                </div>
                <div id="player-visual" class="visual-box">
                    <div id="player-stance-reveal" class="stance-text">?</div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js" type="module"></script>
</body>
</html>
